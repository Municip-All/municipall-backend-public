name: Deploy DEV

on:
  push:
    branches: [ dev ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/municipall-backend:dev

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.dev.yml"
          target: "~/municipall/dev/"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/municipall/dev
            echo "GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}" > .env
            echo "DATABASE_USER_DEV=${{ secrets.DATABASE_USER_DEV }}" >> .env
            echo "DATABASE_PASSWORD_DEV=${{ secrets.DATABASE_PASSWORD_DEV }}" >> .env
            echo "DATABASE_NAME_DEV=${{ secrets.DATABASE_NAME_DEV }}" >> .env
            echo "JWT_SECRET_DEV=${{ secrets.JWT_SECRET_DEV }}" >> .env
            echo "OPENAI_API_KEY_DEV=${{ secrets.OPENAI_API_KEY_DEV }}" >> .env
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose -f docker-compose.dev.yml pull
            docker compose -f docker-compose.dev.yml up -d
