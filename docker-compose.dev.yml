version: "3.9"

services:
  backend-dev:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/municipall-backend:dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_HOST: postgres-dev
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER_DEV}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD_DEV}
      DATABASE_NAME: ${DATABASE_NAME_DEV}
      REDIS_HOST: redis-dev
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET_DEV}
      OPENAI_API_KEY: ${OPENAI_API_KEY_DEV}
    ports:
      - "3001:3001"
    networks:
      - default
      - proxy-bridge
    depends_on:
      - postgres-dev
      - redis-dev

  postgres-dev:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    networks:
      - default
    environment:
      POSTGRES_DB: ${DATABASE_NAME_DEV}
      POSTGRES_USER: ${DATABASE_USER_DEV}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD_DEV}
    ports:
      - "5433:5432" # Map host 5433 to container 5432
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data

  redis-dev:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - default
    ports:
      - "6380:6379" # Map host 6380 to container 6379
    volumes:
      - dev_redis_data:/data

  pgadmin-dev:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    networks:
      - default
      - proxy-bridge
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@municipall.app
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      - postgres-dev

networks:
  default:
  proxy-bridge:
    external: true
    name: municipall_default

volumes:
  dev_postgres_data:
  dev_redis_data:
